<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>學生議會直播 - 表決畫面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper-alt: #fdfbf6;
    --ink: #2a2420;
    --wine: #7a2e2e;
    --wine-dark: #591f1f;
    --forest: #3f4d3a;
    --gold: #b08d57;
    --border-soft: #e4dac9;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: "Noto Serif TC", serif;
  }
  #stage { position: relative; width: 100%; height: 100%; }

  #brand {
    position: absolute; top: 40px; right: 48px;
    display: flex; flex-direction: column; align-items: flex-end;
    background: rgba(42,20,20,0.55);
    padding: 14px 26px;
    border-radius: 8px;
    border: 1px solid rgba(176,141,87,0.5);
  }
  #brand .thusp-word {
    font-family: "EB Garamond", serif;
    font-weight: 700;
    font-size: 24px;
    letter-spacing: 0.32em;
    color: var(--gold);
  }
  #brand .brand-rule {
    width: 60px; height: 1px;
    background: var(--gold);
    opacity: 0.6;
    margin: 6px 0 4px;
  }
  #brand .brand-text {
    color: var(--paper-alt); font-family: "EB Garamond", serif;
    font-size: 18px; letter-spacing: 0.1em; white-space: nowrap;
  }

  #agendaBanner {
    position: absolute; top: 40px; left: 48px; right: 460px;
    background: rgba(42,20,20,0.85);
    border-left: 4px solid var(--gold);
    padding: 14px 24px;
    border-radius: 4px;
  }
  #agendaTitle {
    color: var(--paper-alt);
    font-size: 26px; font-weight: 600;
    outline: none;
  }

  #voteBoxes {
    position: absolute;
    top: 220px; left: 48px;
    display: flex; gap: 40px;
  }
  .vote-box {
    background: var(--gold);
    border-radius: 8px;
    padding: 20px 44px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    text-align: center;
    position: relative;
  }
  .vote-box .label {
    font-size: 30px; font-weight: 700; color: var(--wine-dark);
    outline: none;
  }
  .vote-box .count {
    font-family: "EB Garamond", serif;
    font-size: 76px; font-weight: 700; color: var(--ink);
    outline: none;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin-top: 6px;
  }
  .vote-box .unit {
    font-size: 22px; color: var(--ink); margin-left: 4px;
  }

  #stamp {
    position: absolute; top: 236px; left: 48px;
    transform: rotate(-8deg);
    font-family: "EB Garamond", serif;
    font-weight: 700;
    font-size: 44px;
    padding: 10px 30px;
    border: 5px solid currentColor;
    border-radius: 6px;
    letter-spacing: 0.1em;
    opacity: 0;
    transition: opacity 250ms ease, transform 250ms ease;
    cursor: pointer;
    user-select: none;
  }
  #stamp.show { opacity: 0.92; }
  #stamp.pass { color: var(--forest); background: rgba(63,77,58,0.08); }
  #stamp.fail { color: var(--wine); background: rgba(122,46,46,0.08); }

  #bottomStack {
    position: absolute; left: 0; right: 0; bottom: 0;
  }
  .info-bar {
    background: linear-gradient(180deg, rgba(89,31,31,0.97) 0%, rgba(42,20,20,0.97) 100%);
    height: 96px;
    display: flex; align-items: center;
    padding: 0 40px; gap: 32px;
  }
  .clock {
    font-family: "EB Garamond", serif;
    font-variant-numeric: tabular-nums;
    font-size: 46px; font-weight: 700; color: var(--paper-alt);
    min-width: 210px;
  }
  .v-div { width: 1px; height: 44px; background: rgba(176,141,87,0.4); }
  .agenda-text {
    flex: 1; font-size: 30px; font-weight: 600; color: var(--paper-alt); outline: none;
  }
  .live-dot {
    display: flex; align-items: center; gap: 10px;
    font-family: "EB Garamond", serif; font-size: 22px; letter-spacing: 0.16em; color: var(--paper-alt);
  }
  .live-dot .dot {
    width: 14px; height: 14px; border-radius: 50%; background: #c0392b;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  [contenteditable="true"] { cursor: text; border-radius: 4px; padding: 2px 6px; margin: -2px -6px; }
  [contenteditable="true"]:hover { background: rgba(176,141,87,0.15); }
  [contenteditable="true"]:focus {
    background: rgba(176,141,87,0.25);
    box-shadow: 0 0 0 1px rgba(176,141,87,0.6);
  }
  .flash { animation: flash-update 900ms ease; }
  @keyframes flash-update { 0% { color: #ffe9b3; } 100% { color: inherit; } }

  #hint {
    position: absolute; left: 48px; top: 40px;
    font-family: "EB Garamond", serif;
    font-size: 18px; color: rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.4);
    padding: 6px 14px; border-radius: 6px;
    transition: opacity 600ms ease;
  }
</style>
</head>
<body>
<div id="stage">

  <div id="hint">數字/標題點一下即可修改　｜　點「通過章」可切換：無 → 通過 → 不通過</div>

  <div id="brand">
    <span class="thusp-word">THUSP</span>
    <span class="brand-rule"></span>
    <span class="brand-text">東海大學第三十八屆學生議會</span>
  </div>

  <div id="agendaBanner">
    <div id="agendaTitle" contenteditable="true" spellcheck="false">擬請學生議會同意任命○○部部長</div>
  </div>

  <div id="voteBoxes">
    <div class="vote-box">
      <div class="label">同意</div>
      <div><span class="count" id="agreeCount" contenteditable="true" spellcheck="false">0</span><span class="unit">人</span></div>
    </div>
    <div class="vote-box">
      <div class="label">不同意</div>
      <div><span class="count" id="disagreeCount" contenteditable="true" spellcheck="false">0</span><span class="unit">人</span></div>
    </div>
  </div>

  <div id="stamp">通過</div>

  <div id="bottomStack">
    <div class="info-bar">
      <div class="clock" id="datetime"></div>
      <div class="v-div"></div>
      <div class="agenda-text" id="agendaBottomText" contenteditable="true" spellcheck="false">表決中</div>
      <div class="live-dot"><span class="dot"></span>LIVE</div>
    </div>
  </div>

</div>

<script>
  const STORAGE_KEY = "thu-council-live-v1";
  function loadShared() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
    catch (e) { return {}; }
  }
  function saveShared(patch) {
    const state = loadShared();
    Object.assign(state, patch);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  const editableIds = ["agendaTitle", "agreeCount", "disagreeCount", "agendaBottomText"];
  const state = loadShared();
  editableIds.forEach((id) => {
    const key = "vote_" + id;
    if (state[key] !== undefined) document.getElementById(id).textContent = state[key];
  });

  editableIds.forEach((id) => {
    const el = document.getElementById(id);
    el.addEventListener("blur", () => {
      saveShared({ ["vote_" + id]: el.textContent });
      el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash");
    });
    el.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); el.blur(); } });
  });

  // stamp cycle: none -> pass -> fail -> none
  const stampStates = ["none", "pass", "fail"];
  const stampLabels = { pass: "通過", fail: "不通過" };
  let stampState = state.vote_stampState || "none";
  const stampEl = document.getElementById("stamp");
  function renderStamp() {
    stampEl.classList.remove("show", "pass", "fail");
    if (stampState !== "none") {
      stampEl.textContent = stampLabels[stampState];
      stampEl.classList.add("show", stampState);
    }
  }
  renderStamp();
  stampEl.addEventListener("click", () => {
    const idx = (stampStates.indexOf(stampState) + 1) % stampStates.length;
    stampState = stampStates[idx];
    renderStamp();
    saveShared({ vote_stampState: stampState });
  });

  function updateClock() {
    const now = new Date();
    document.getElementById("datetime").textContent = new Intl.DateTimeFormat("zh-TW", {
      timeZone: "Asia/Taipei", hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
    }).format(now);
  }
  updateClock();
  setInterval(updateClock, 1000);

  setTimeout(() => { document.getElementById("hint").style.opacity = "0"; }, 8000);
</script>
</body>
</html>
