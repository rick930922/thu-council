<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>學生議會直播字卡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f6f1e7;
    --paper-alt: #fdfbf6;
    --ink: #2a2420;
    --ink-soft: #6b6055;
    --wine: #7a2e2e;
    --wine-dark: #591f1f;
    --forest: #3f4d3a;
    --gold: #b08d57;
    --border-soft: #e4dac9;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: "Noto Serif TC", serif;
  }

  #stage {
    position: relative;
    width: 100%;
    height: 100%;
  }

  /* ---- Session badge (top-left of the lower third) ---- */
  #card {
    position: absolute;
    left: 64px;
    bottom: 56px;
    width: 1400px;
    transform: translateY(0);
    opacity: 1;
    transition: transform 480ms cubic-bezier(.22,1,.36,1), opacity 360ms ease;
  }
  #card.hidden {
    transform: translateY(24px);
    opacity: 0;
    pointer-events: none;
  }

  .rule-top {
    height: 3px;
    background: linear-gradient(to right, var(--gold) 0%, var(--gold) 60%, transparent 100%);
  }

  .panel {
    background: linear-gradient(180deg, rgba(89,31,31,0.94) 0%, rgba(42,20,20,0.94) 100%);
    padding: 22px 36px 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    border-bottom: 1px solid rgba(176,141,87,0.5);
  }

  .eyebrow-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
    font-family: "EB Garamond", serif;
  }

  .eyebrow {
    letter-spacing: 0.24em;
    text-transform: uppercase;
    font-size: 20px;
    color: var(--gold);
    display: flex;
    align-items: baseline;
    gap: 18px;
  }

  .eyebrow .divider {
    color: rgba(176,141,87,0.5);
  }

  .session-num {
    font-variant-numeric: tabular-nums;
  }

  .datetime {
    font-family: "EB Garamond", serif;
    font-size: 20px;
    letter-spacing: 0.06em;
    color: var(--paper-alt);
    opacity: 0.85;
    font-variant-numeric: tabular-nums;
  }

  .main-row {
    display: flex;
    align-items: center;
    gap: 28px;
    flex-wrap: wrap;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .field-label {
    font-family: "EB Garamond", serif;
    font-size: 15px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(246,241,231,0.55);
  }

  .field-value {
    font-size: 34px;
    font-weight: 600;
    color: var(--paper-alt);
    line-height: 1.25;
    outline: none;
    min-width: 40px;
  }

  .field-value.speaker {
    color: var(--gold);
    font-size: 40px;
    font-weight: 700;
  }

  .v-sep {
    width: 1px;
    align-self: stretch;
    background: linear-gradient(to bottom, transparent, var(--border-soft) 20%, var(--border-soft) 80%, transparent);
    opacity: 0.4;
  }

  .speaking-row {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid rgba(176,141,87,0.3);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .speaking-label {
    font-family: "EB Garamond", serif;
    font-size: 16px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(246,241,231,0.55);
  }

  [contenteditable="true"] {
    cursor: text;
    border-radius: 4px;
    padding: 2px 6px;
    margin: -2px -6px;
  }

  [contenteditable="true"]:hover {
    background: rgba(176,141,87,0.12);
  }

  [contenteditable="true"]:focus {
    background: rgba(176,141,87,0.22);
    box-shadow: 0 0 0 1px rgba(176,141,87,0.6);
  }

  .flash {
    animation: flash-update 900ms ease;
  }

  @keyframes flash-update {
    0% { color: #fff3d6; }
    100% { color: inherit; }
  }

  #hint {
    position: absolute;
    left: 64px;
    top: 40px;
    font-family: "EB Garamond", serif;
    font-size: 18px;
    color: rgba(255,255,255,0.55);
    background: rgba(0,0,0,0.35);
    padding: 6px 14px;
    border-radius: 6px;
  }
</style>
</head>
<body>
<div id="stage">

  <div id="hint">按 H 鍵：顯示 / 隱藏字卡　｜　直接點文字即可修改</div>

  <div id="card">
    <div class="rule-top"></div>
    <div class="panel">

      <div class="eyebrow-row">
        <div class="eyebrow">
          <span>東海大學第三十八屆學生議會</span>
          <span class="divider">｜</span>
          <span>第 <span id="sessionNum" class="session-num" contenteditable="true" spellcheck="false">1</span> 次定期大會</span>
        </div>
        <div class="datetime" id="datetime"></div>
      </div>

      <div class="main-row">
        <div class="field">
          <div class="field-label">質詢議員</div>
          <div class="field-value" id="askerName" contenteditable="true" spellcheck="false">議員姓名</div>
        </div>

        <div class="v-sep"></div>

        <div class="field">
          <div class="field-label">質詢對象部門</div>
          <div class="field-value" id="targetDept" contenteditable="true" spellcheck="false">部門名稱</div>
        </div>
      </div>

      <div class="speaking-row">
        <span class="speaking-label">現在發言</span>
        <span class="field-value speaker" id="speakerName" contenteditable="true" spellcheck="false">發言人姓名</span>
        <span class="speaking-label" style="margin-left:6px;">／</span>
        <span class="field-value speaker" id="speakerDept" contenteditable="true" spellcheck="false" style="font-size:28px;">發言部門</span>
      </div>

    </div>
  </div>

</div>

<script>
  const STORAGE_KEY = "thu-council-lower-third-v1";
  const editableIds = ["sessionNum", "askerName", "targetDept", "speakerName", "speakerDept"];

  function loadState() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      editableIds.forEach((id) => {
        if (saved[id] !== undefined) {
          document.getElementById(id).textContent = saved[id];
        }
      });
    } catch (e) {}
  }

  function saveState() {
    const state = {};
    editableIds.forEach((id) => {
      state[id] = document.getElementById(id).textContent;
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  editableIds.forEach((id) => {
    const el = document.getElementById(id);
    el.addEventListener("blur", () => {
      saveState();
      el.classList.remove("flash");
      void el.offsetWidth;
      el.classList.add("flash");
    });
    el.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        el.blur();
      }
    });
  });

  loadState();

  function updateClock() {
    const now = new Date();
    const formatted = new Intl.DateTimeFormat("zh-TW", {
      timeZone: "Asia/Taipei",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      hour12: false,
    }).format(now);
    document.getElementById("datetime").textContent = formatted;
  }
  updateClock();
  setInterval(updateClock, 1000 * 15);

  let visible = true;
  window.addEventListener("keydown", (e) => {
    if (e.key.toLowerCase() === "h") {
      visible = !visible;
      document.getElementById("card").classList.toggle("hidden", !visible);
    }
  });

  document.getElementById("hint").addEventListener("animationend", () => {});
  setTimeout(() => {
    document.getElementById("hint").style.transition = "opacity 600ms ease";
    document.getElementById("hint").style.opacity = "0";
  }, 8000);
</script>
</body>
</html>
