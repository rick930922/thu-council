<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>學生議會直播字卡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f6f1e7;
    --paper-alt: #fdfbf6;
    --ink: #2a2420;
    --ink-soft: #6b6055;
    --wine: #7a2e2e;
    --wine-dark: #591f1f;
    --forest: #3f4d3a;
    --gold: #b08d57;
    --border-soft: #e4dac9;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: transparent;
    width: 1920px; height: 1080px;
    overflow: auto;
    font-family: "Noto Serif TC", serif;
  }
  #stage { position: relative; width: 100%; height: 100%; }

  /* ---------- top-right stack: logo + name badges, auto-spaced ---------- */
  #topRightStack {
    position: absolute;
    top: 40px; right: 48px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 16px;
    z-index: 5;
  }

  #brand {
    display: flex; flex-direction: column; align-items: flex-end;
    background: rgba(42,20,20,0.55);
    padding: 14px 26px;
    border-radius: 8px;
    border: 1px solid rgba(176,141,87,0.5);
  }
  #brand .thusp-word {
    font-family: "EB Garamond", serif;
    font-weight: 700;
    font-size: 24px;
    letter-spacing: 0.32em;
    color: var(--gold);
  }
  #brand .brand-rule {
    width: 60px; height: 1px;
    background: var(--gold);
    opacity: 0.6;
    margin: 6px 0 4px;
  }
  #brand .brand-text {
    color: var(--paper-alt);
    font-family: "EB Garamond", serif;
    font-size: 18px;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  /* ---------- floating "質詢議員" / "目前發言" callouts ---------- */
  #askerBadge, #speakerBadge {
    width: 420px;
    text-align: right;
    transition: opacity 360ms ease, transform 360ms ease;
  }
  #askerBadge.hidden, #speakerBadge.hidden { opacity: 0; transform: translateY(-10px); pointer-events: none; }
  .speaker-tag {
    display: inline-block;
    background: var(--gold);
    color: var(--wine-dark);
    font-family: "EB Garamond", serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.2em;
    padding: 5px 16px;
    border-radius: 4px 4px 0 0;
  }
  .speaker-plate {
    background: rgba(253,251,246,0.96);
    padding: 14px 20px;
    border-radius: 0 0 6px 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  .speaker-name {
    font-size: 30px;
    font-weight: 700;
    color: var(--ink);
    outline: none;
  }
  .speaker-role {
    font-size: 18px;
    color: var(--ink-soft);
    margin-left: 8px;
    outline: none;
  }

  /* ---------- bottom: ticker + info bar ---------- */
  #bottomStack {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    transition: transform 420ms cubic-bezier(.22,1,.36,1), opacity 320ms ease;
  }
  #bottomStack.hidden { transform: translateY(100%); opacity: 0; pointer-events: none; }

  .ticker {
    background: var(--paper-alt);
    border-top: 2px solid var(--gold);
    border-bottom: 1px solid var(--border-soft);
    overflow: hidden;
    white-space: nowrap;
    height: 46px;
    display: flex;
    align-items: center;
  }
  .ticker-track {
    display: inline-flex;
    animation: ticker-scroll 22s linear infinite;
  }
  .ticker-track span {
    padding: 0 60px;
    font-family: "EB Garamond", serif;
    font-size: 24px;
    letter-spacing: 0.1em;
    color: var(--wine-dark);
    font-weight: 600;
  }
  @keyframes ticker-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .info-bar {
    background: linear-gradient(180deg, rgba(89,31,31,0.97) 0%, rgba(42,20,20,0.97) 100%);
    height: 96px;
    display: flex;
    align-items: center;
    padding: 0 40px;
    gap: 32px;
  }
  .clock {
    font-family: "EB Garamond", serif;
    font-variant-numeric: tabular-nums;
    font-size: 46px;
    font-weight: 700;
    color: var(--paper-alt);
    min-width: 210px;
  }
  .v-div {
    width: 1px; height: 44px;
    background: rgba(176,141,87,0.4);
  }
  .agenda-text {
    flex: 1;
    font-size: 30px;
    font-weight: 600;
    color: var(--paper-alt);
    outline: none;
  }
  .live-dot {
    display: flex; align-items: center; gap: 10px;
    font-family: "EB Garamond", serif;
    font-size: 22px;
    letter-spacing: 0.16em;
    color: var(--paper-alt);
  }
  .live-dot .dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: #c0392b;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  [contenteditable="true"] {
    cursor: text; border-radius: 4px;
    padding: 2px 6px; margin: -2px -6px;
  }
  [contenteditable="true"]:hover { background: rgba(176,141,87,0.15); }
  [contenteditable="true"]:focus {
    background: rgba(176,141,87,0.25);
    box-shadow: 0 0 0 1px rgba(176,141,87,0.6);
  }
  .flash { animation: flash-update 900ms ease; }
  @keyframes flash-update {
    0% { color: #ffe9b3; }
    100% { color: inherit; }
  }

  #hint {
    position: absolute; left: 48px; top: 40px;
    font-family: "EB Garamond", serif;
    font-size: 18px; color: rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.4);
    padding: 6px 14px; border-radius: 6px;
    transition: opacity 600ms ease;
  }
</style>
</head>
<body>
<div id="stage">

  <div id="hint">按 H：顯示/隱藏底部字卡　｜　按 Q：顯示/隱藏質詢議員名牌　｜　按 S：顯示/隱藏發言名牌　｜　點文字即可修改</div>

  <div id="topRightStack">
    <div id="brand">
      <span class="thusp-word">THUSP</span>
      <span class="brand-rule"></span>
      <span class="brand-text">東海大學第三十八屆學生議會</span>
    </div>

    <div id="askerBadge">
      <div class="speaker-tag">質詢議員</div>
      <div class="speaker-plate">
        <span class="speaker-name" id="askerName" contenteditable="true" spellcheck="false">議員姓名</span>
      </div>
    </div>

    <div id="speakerBadge">
      <div class="speaker-tag" id="speakerTag" contenteditable="true" spellcheck="false">目前發言</div>
      <div class="speaker-plate">
        <span class="speaker-name" id="speakerName" contenteditable="true" spellcheck="false">發言人姓名</span><span class="speaker-role" id="speakerRole" contenteditable="true" spellcheck="false">部長</span>
      </div>
    </div>
  </div>

  <div id="bottomStack">
    <div class="ticker">
      <div class="ticker-track" id="tickerTrack">
        <span id="tickerText1" contenteditable="true" spellcheck="false">東海大學第三十八屆學生議會・第 <span class="session-num" data-mirror="sessionNum">1</span> 次定期大會</span>
        <span id="tickerText2" aria-hidden="true">東海大學第三十八屆學生議會・第 <span class="session-num" data-mirror="sessionNum">1</span> 次定期大會</span>
      </div>
    </div>
    <div class="info-bar">
      <div class="clock" id="datetime"></div>
      <div class="v-div"></div>
      <div class="agenda-text" id="agendaText" contenteditable="true" spellcheck="false">質詢部門：財務部</div>
      <div class="live-dot"><span class="dot"></span>LIVE</div>
    </div>
  </div>

</div>

<script>
  const STORAGE_KEY = "thu-council-live-v1";
  const API_URL = "/api/live-state";

  function loadShared() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
    catch (e) { return {}; }
  }
  function saveLocal(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }
  async function fetchRemote() {
    try {
      const res = await fetch(API_URL, { cache: "no-store" });
      if (!res.ok) return null;
      return await res.json();
    } catch (e) { return null; }
  }
  function postRemote(patch) {
    fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(patch),
    }).catch(() => {});
  }
  function saveShared(patch) {
    const state = loadShared();
    Object.assign(state, patch);
    saveLocal(state);
    postRemote(patch);
    return state;
  }

  const editableIds = ["askerName", "speakerTag", "speakerName", "speakerRole", "agendaText"];

  function applyState(s) {
    editableIds.forEach((id) => {
      const el = document.getElementById(id);
      if (s[id] !== undefined && document.activeElement !== el && el.textContent !== s[id]) {
        el.textContent = s[id];
      }
    });
    if (s.sessionNum !== undefined) {
      document.querySelectorAll('[data-mirror="sessionNum"]').forEach(el => {
        if (document.activeElement !== el) el.textContent = s.sessionNum;
      });
    }
  }

  applyState(loadShared());

  (async () => {
    const remote = await fetchRemote();
    if (remote) {
      const merged = Object.assign({}, loadShared(), remote);
      saveLocal(merged);
      applyState(merged);
    }
  })();

  editableIds.forEach((id) => {
    const el = document.getElementById(id);
    el.addEventListener("blur", () => {
      saveShared({ [id]: el.textContent });
      el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash");
    });
    el.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); el.blur(); } });
  });

  // session number is edited via the ticker text's inline span (double-click to isolate edit)
  document.querySelectorAll('.session-num').forEach(el => {
    el.setAttribute("contenteditable", "true");
    el.addEventListener("blur", () => {
      const val = el.textContent;
      document.querySelectorAll('[data-mirror="sessionNum"]').forEach(e2 => e2.textContent = val);
      saveShared({ sessionNum: val });
    });
  });

  window.addEventListener("storage", (e) => {
    if (e.key !== STORAGE_KEY) return;
    applyState(loadShared());
  });

  setInterval(async () => {
    const remote = await fetchRemote();
    if (!remote) return;
    saveLocal(Object.assign({}, loadShared(), remote));
    applyState(remote);
  }, 1500);

  function updateClock() {
    const now = new Date();
    document.getElementById("datetime").textContent = new Intl.DateTimeFormat("zh-TW", {
      timeZone: "Asia/Taipei", hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
    }).format(now);
  }
  updateClock();
  setInterval(updateClock, 1000);

  let bottomVisible = true, speakerVisible = true, askerVisible = true;
  window.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (k === "h") { bottomVisible = !bottomVisible; document.getElementById("bottomStack").classList.toggle("hidden", !bottomVisible); }
    if (k === "s") { speakerVisible = !speakerVisible; document.getElementById("speakerBadge").classList.toggle("hidden", !speakerVisible); }
    if (k === "q") { askerVisible = !askerVisible; document.getElementById("askerBadge").classList.toggle("hidden", !askerVisible); }
  });

  setTimeout(() => { document.getElementById("hint").style.opacity = "0"; }, 8000);
</script>
</body>
</html>
