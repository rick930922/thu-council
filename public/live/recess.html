<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>學生議會直播 - 休息畫面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper-alt: #fdfbf6;
    --wine: #7a2e2e;
    --wine-dark: #591f1f;
    --gold: #b08d57;
    --border-soft: #e4dac9;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 1920px; height: 1080px;
    overflow: auto;
    font-family: "Noto Serif TC", serif;
    background: rgba(20,10,10,0.6);
  }
  #stage {
    position: relative; width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 220ms ease;
  }
  #stage.fonts-ready { opacity: 1; }

  #timecode {
    position: absolute; top: 28px; left: 36px;
    font-family: "EB Garamond", serif;
    font-size: 20px; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.55);
    font-variant-numeric: tabular-nums;
  }

  #topClockBar {
    position: absolute; top: 0; left: 0; right: 0;
    background: rgba(89,31,31,0.85);
    border-bottom: 2px solid var(--gold);
    height: 54px; display: flex; align-items: center; justify-content: center;
  }
  #topClockBar #clock {
    font-family: "EB Garamond", serif;
    font-variant-numeric: tabular-nums;
    font-size: 28px; font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--paper-alt);
    margin: 0;
  }

  #center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px;
    pointer-events: none;
  }
  #recessLabel {
    font-size: 190px;
    font-weight: 900;
    color: var(--paper-alt);
    letter-spacing: 0.12em;
    text-shadow: 0 8px 40px rgba(0,0,0,0.5);
    outline: none;
    pointer-events: auto;
  }

  #brandRow {
    display: flex; flex-direction: column; align-items: center;
    margin-top: 8px;
  }
  #brandRow .thusp-word {
    font-family: "EB Garamond", serif;
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 0.32em;
    color: var(--gold);
  }
  #brandRow .brand-rule {
    width: 70px; height: 1px;
    background: var(--gold);
    opacity: 0.6;
    margin: 8px 0 6px;
  }
  #brandRow .brand-text {
    font-family: "EB Garamond", serif;
    font-size: 22px; letter-spacing: 0.1em;
    color: var(--paper-alt);
  }

  /* ---- 主席／秘書長／文書記錄 ---- */
  #rolesRow {
    display: flex;
    gap: 22px;
    margin-top: 90px;
    pointer-events: auto;
  }
  .role-box {
    background: rgba(42,20,20,0.55);
    border: 1px solid rgba(176,141,87,0.4);
    border-radius: 8px;
    padding: 12px 24px;
    text-align: center;
    min-width: 180px;
  }
  .role-title {
    font-family: "EB Garamond", serif;
    font-size: 15px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    outline: none;
    margin-bottom: 6px;
  }
  .role-name {
    font-size: 26px;
    font-weight: 700;
    color: var(--paper-alt);
    outline: none;
  }

  /* ---- attendance rosters (left: 出席議員, right: 列席幹部) ---- */
  .roster-panel {
    position: absolute;
    top: 66px;
    width: 370px;
    background: rgba(42,20,20,0.55);
    border: 1px solid rgba(176,141,87,0.4);
    border-radius: 10px;
    padding: 12px 16px;
  }
  #leftRosterPanel { left: 30px; }
  #rightRosterPanel { right: 30px; }

  .roster-header {
    font-family: "EB Garamond", serif;
    font-size: 14px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    margin-bottom: 6px;
  }
  .roster-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .roster-row {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 1px 6px;
    border-radius: 4px;
  }
  .roster-row:nth-child(even) {
    background: rgba(255,255,255,0.03);
  }
  .roster-check {
    width: 20px; height: 20px;
    border: 1.5px solid var(--gold);
    border-radius: 4px;
    flex-shrink: 0;
    cursor: pointer;
    position: relative;
  }
  .roster-check.checked {
    background: var(--gold);
  }
  .roster-check.checked::after {
    content: "\2713";
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; line-height: 1;
    color: var(--wine-dark); font-weight: 700;
  }
  .roster-name {
    flex: 1;
    font-size: 21px;
    line-height: 1.2;
    color: var(--paper-alt);
    outline: none;
  }

  [contenteditable="true"] {
    cursor: text; border-radius: 6px; padding: 2px 10px; margin: -2px -10px;
  }
  [contenteditable="true"]:hover { background: rgba(176,141,87,0.15); }
  [contenteditable="true"]:focus {
    background: rgba(176,141,87,0.25);
    box-shadow: 0 0 0 1px rgba(176,141,87,0.6);
  }
  .flash { animation: flash-update 900ms ease; }
  @keyframes flash-update {
    0% { color: #ffe9b3; }
    100% { color: inherit; }
  }


</style>
</head>
<body>
<div id="stage">

  <div id="timecode" id="timecode"></div>

  <div id="topClockBar">
    <div id="clock"></div>
  </div>

  <div id="leftRosterPanel" class="roster-panel">
    <div class="roster-header">出席議員</div>
    <div class="roster-list" id="leftRosterList"></div>
  </div>

  <div id="rightRosterPanel" class="roster-panel">
    <div class="roster-header">列席幹部</div>
    <div class="roster-list" id="rightRosterList"></div>
  </div>

  <div id="center">
    <div id="recessLabel" contenteditable="true" spellcheck="false">休息</div>
    <div id="brandRow">
      <span class="thusp-word">THUSP</span>
      <span class="brand-rule"></span>
      <span class="brand-text">東海大學第三十八屆學生議會</span>
    </div>

    <div id="rolesRow">
      <div class="role-box">
        <div class="role-title" id="chairTitle" contenteditable="true" spellcheck="false">會議主席</div>
        <div class="role-name" id="chairName" contenteditable="true" spellcheck="false">姓名</div>
      </div>
      <div class="role-box">
        <div class="role-title" id="secretaryTitle" contenteditable="true" spellcheck="false">秘書長</div>
        <div class="role-name" id="secretaryName" contenteditable="true" spellcheck="false">姓名</div>
      </div>
      <div class="role-box">
        <div class="role-title" id="clerkTitle" contenteditable="true" spellcheck="false">文書記錄</div>
        <div class="role-name" id="clerkName" contenteditable="true" spellcheck="false">姓名</div>
      </div>
    </div>
  </div>

</div>

<script>
  (function () {
    var stage = document.getElementById("stage");
    function reveal() { stage.classList.add("fonts-ready"); }
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(reveal);
    } else {
      reveal();
    }
    setTimeout(reveal, 1500);
  })();

  const STORAGE_KEY = "thu-council-live-v1";
  const API_URL = "/api/live-state";

  function loadShared() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
    catch (e) { return {}; }
  }
  function saveLocal(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }
  async function fetchRemote() {
    try {
      const res = await fetch(API_URL, { cache: "no-store" });
      if (!res.ok) return null;
      return await res.json();
    } catch (e) { return null; }
  }
  function postRemote(patch) {
    fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(patch),
    }).catch(() => {});
  }
  function saveShared(patch) {
    const state = loadShared();
    Object.assign(state, patch);
    saveLocal(state);
    postRemote(patch);
  }

  function formatClock(now) {
    return new Intl.DateTimeFormat("zh-TW", {
      timeZone: "Asia/Taipei", hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
    }).format(now);
  }

  const editableIds = [
    "recessLabel",
    "chairTitle", "chairName",
    "secretaryTitle", "secretaryName",
    "clerkTitle", "clerkName",
  ];

  // ---- build the two attendance rosters ----
  const LEFT_ROSTER_DEFAULTS = [
    "梁俊億 議長",
    "高予恩 副議長",
    "陳紀睿・議員（生科系）",
    "張仲毅・議員（政治學系）",
    "許峻睿・議員（政治學系）",
    "蔡玗霖・議員（社會學系）",
    "李聖亞・議員（行政管理暨政策學系）",
    "黃柏皓・議員（美術系）",
    "王立言・議員（美術系）",
    "洪采妤・議員（音樂系）",
    "林均亞・議員（音樂系）",
    "陳星羽・議員（音樂系）",
    "李宇衒・議員（環工系）",
    "陳則宇・議員（環工系）",
    "洪若傑・議員（工工系）",
    "陳信宇・議員（電機系）",
    "林暐翔・議員（電機系）",
    "王郁為・議員（電機系）",
    "楊琇棋・議員（永續科學與管理學士學位學程）",
    "林琇君・議員（畜產系）",
    "洪崇凱・議員（畜產系）",
    "陳紘・議員（畜產系）",
    "楊佩樺・議員（會計系）",
    "許暐鋒・議員（國貿系）",
    "薛喬丰・議員",
    "趙宥任・議員",
  ];

  const RIGHT_ROSTER_DEFAULTS = [
    "邱煜翔・會長",
    "溫侑萱・副會長",
    "張戎忠・秘書長",
    "林上邕・副秘書長",
    "謝耀陞・學權部部長",
    "才宜禎・學權部副部長",
    "蔡睿恩・外務部部長",
    "王傑民・外務部副部長",
    "林漢儒・學會部部長",
    "柯承漢・學會部副部長",
    "社團部部長",
    "社團部副部長",
    "劉又瑄・新聞部部長",
    "陳振家・新聞部副部長",
    "張惠玟（未定）・總務部部長",
    "總務部副部長",
    "林佳穎・選舉委員會主任委員",
    "賴俞靜・選舉委員會副主任委員",
  ];

  function buildRoster(listId, count, keyPrefix, namePlaceholder, defaultTitle, defaultNames) {
    const list = document.getElementById(listId);
    for (let i = 1; i <= count; i++) {
      const row = document.createElement("div");
      row.className = "roster-row";

      const check = document.createElement("span");
      check.className = "roster-check";
      check.dataset.key = keyPrefix + i + "Checked";

      const name = document.createElement("span");
      name.className = "roster-name";
      name.contentEditable = "true";
      name.spellcheck = false;
      name.dataset.key = keyPrefix + i + "Name";
      name.textContent = defaultNames ? defaultNames[i - 1] : namePlaceholder + i + "・" + defaultTitle;

      row.appendChild(check);
      row.appendChild(name);
      list.appendChild(row);
    }
  }
  buildRoster("leftRosterList", LEFT_ROSTER_DEFAULTS.length, "rosterL", "議員姓名 ", "議員", LEFT_ROSTER_DEFAULTS);
  buildRoster("rightRosterList", RIGHT_ROSTER_DEFAULTS.length, "rosterR", "幹部姓名 ", "幹部", RIGHT_ROSTER_DEFAULTS);

  function applyState(s) {
    editableIds.forEach((id) => {
      const el = document.getElementById(id);
      const key = "recess_" + id;
      if (s[key] !== undefined && document.activeElement !== el && el.textContent !== s[key]) {
        el.textContent = s[key];
      }
    });
    document.querySelectorAll(".roster-name[data-key]").forEach((el) => {
      const key = el.dataset.key;
      if (s[key] !== undefined && document.activeElement !== el && el.textContent !== s[key]) {
        el.textContent = s[key];
      }
    });
    document.querySelectorAll(".roster-check[data-key]").forEach((el) => {
      const key = el.dataset.key;
      if (s[key] !== undefined) {
        el.classList.toggle("checked", s[key] === true || s[key] === "true");
      }
    });
  }

  const initial = loadShared();
  editableIds.forEach((id) => {
    const key = "recess_" + id;
    if (initial[key] !== undefined) {
      document.getElementById(id).textContent = initial[key];
    }
  });
  applyState(initial);

  (async () => {
    const remote = await fetchRemote();
    if (remote) {
      saveLocal(Object.assign({}, loadShared(), remote));
      applyState(remote);
    }
  })();

  editableIds.forEach((id) => {
    const el = document.getElementById(id);
    el.addEventListener("blur", () => {
      saveShared({ ["recess_" + id]: el.textContent });
      el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash");
    });
    el.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); el.blur(); } });
  });

  document.querySelectorAll(".roster-name[data-key]").forEach((el) => {
    el.addEventListener("blur", () => {
      saveShared({ [el.dataset.key]: el.textContent });
      el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash");
    });
    el.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); el.blur(); } });
  });

  document.querySelectorAll(".roster-check[data-key]").forEach((el) => {
    el.addEventListener("click", () => {
      const nowChecked = !el.classList.contains("checked");
      el.classList.toggle("checked", nowChecked);
      saveShared({ [el.dataset.key]: nowChecked });
    });
  });

  setInterval(async () => {
    const remote = await fetchRemote();
    if (!remote) return;
    saveLocal(Object.assign({}, loadShared(), remote));
    applyState(remote);
  }, 1500);

  function updateTimecode() {
    const now = new Date();
    document.getElementById("clock").textContent = formatClock(now);
    document.getElementById("timecode").textContent = "LIVE " + new Intl.DateTimeFormat("zh-TW", {
      timeZone: "Asia/Taipei", year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
    }).format(now).replace(/\//g, ".");
  }
  updateTimecode();
  setInterval(updateTimecode, 1000);
</script>
</body>
</html>
