<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>學生議會直播 - 休息畫面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper-alt: #fdfbf6;
    --wine: #7a2e2e;
    --wine-dark: #591f1f;
    --gold: #b08d57;
    --border-soft: #e4dac9;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 1920px; height: 1080px;
    overflow: auto;
    font-family: "Noto Serif TC", serif;
    background: rgba(20,10,10,0.6);
  }
  #stage { position: relative; width: 100%; height: 100%; }

  #timecode {
    position: absolute; top: 28px; left: 36px;
    font-family: "EB Garamond", serif;
    font-size: 20px; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.55);
    font-variant-numeric: tabular-nums;
  }

  .ticker {
    position: absolute; top: 0; left: 0; right: 0;
    background: rgba(89,31,31,0.85);
    border-bottom: 2px solid var(--gold);
    overflow: hidden; white-space: nowrap;
    height: 54px; display: flex; align-items: center;
  }
  .ticker-track { display: inline-flex; animation: ticker-scroll 18s linear infinite; }
  .ticker-track:hover, .ticker-track:focus-within { animation-play-state: paused; }
  .ticker-track span {
    padding: 0 60px;
    font-family: "EB Garamond", serif;
    font-size: 26px; letter-spacing: 0.1em;
    color: var(--paper-alt); font-weight: 600;
  }
  @keyframes ticker-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  #center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px;
  }
  #recessLabel {
    font-size: 190px;
    font-weight: 900;
    color: var(--paper-alt);
    letter-spacing: 0.12em;
    text-shadow: 0 8px 40px rgba(0,0,0,0.5);
    outline: none;
  }

  #brandRow {
    display: flex; flex-direction: column; align-items: center;
    margin-top: 8px;
  }
  #brandRow .thusp-word {
    font-family: "EB Garamond", serif;
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 0.32em;
    color: var(--gold);
  }
  #brandRow .brand-rule {
    width: 70px; height: 1px;
    background: var(--gold);
    opacity: 0.6;
    margin: 8px 0 6px;
  }
  #brandRow .brand-text {
    font-family: "EB Garamond", serif;
    font-size: 22px; letter-spacing: 0.1em;
    color: var(--paper-alt);
  }

  #clock {
    font-family: "EB Garamond", serif;
    font-variant-numeric: tabular-nums;
    font-size: 46px; font-weight: 700;
    color: var(--paper-alt);
    margin-top: 4px;
  }

  [contenteditable="true"] {
    cursor: text; border-radius: 6px; padding: 2px 10px; margin: -2px -10px;
  }
  [contenteditable="true"]:hover { background: rgba(176,141,87,0.15); }
  [contenteditable="true"]:focus {
    background: rgba(176,141,87,0.25);
    box-shadow: 0 0 0 1px rgba(176,141,87,0.6);
  }
  .flash { animation: flash-update 900ms ease; }
  @keyframes flash-update {
    0% { color: #ffe9b3; }
    100% { color: inherit; }
  }

  #hint {
    position: absolute; left: 36px; bottom: 28px;
    font-family: "EB Garamond", serif;
    font-size: 18px; color: rgba(255,255,255,0.55);
    background: rgba(0,0,0,0.4);
    padding: 6px 14px; border-radius: 6px;
    transition: opacity 600ms ease;
  }
</style>
</head>
<body>
<div id="stage">

  <div id="hint">點文字即可修改跑馬燈／休息文字　｜　滑鼠移到跑馬燈上會暫停捲動方便點擊</div>
  <div id="timecode" id="timecode"></div>

  <div class="ticker">
    <div class="ticker-track">
      <span id="tickerText1" contenteditable="true" spellcheck="false">休息 5 分鐘，於 19:45 分開會</span>
      <span id="tickerText2" aria-hidden="true">休息 5 分鐘，於 19:45 分開會</span>
    </div>
  </div>

  <div id="center">
    <div id="recessLabel" contenteditable="true" spellcheck="false">休息</div>
    <div id="brandRow">
      <span class="thusp-word">THUSP</span>
      <span class="brand-rule"></span>
      <span class="brand-text">東海大學第三十八屆學生議會</span>
    </div>
    <div id="clock"></div>
  </div>

</div>

<script>
  const STORAGE_KEY = "thu-council-live-v1";
  const API_URL = "/api/live-state";

  function loadShared() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
    catch (e) { return {}; }
  }
  function saveLocal(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }
  async function fetchRemote() {
    try {
      const res = await fetch(API_URL, { cache: "no-store" });
      if (!res.ok) return null;
      return await res.json();
    } catch (e) { return null; }
  }
  function postRemote(patch) {
    fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(patch),
    }).catch(() => {});
  }
  function saveShared(patch) {
    const state = loadShared();
    Object.assign(state, patch);
    saveLocal(state);
    postRemote(patch);
  }

  function formatClock(now) {
    return new Intl.DateTimeFormat("zh-TW", {
      timeZone: "Asia/Taipei", hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
    }).format(now);
  }

  const editableIds = ["tickerText1", "recessLabel"];

  function applyState(s) {
    let tickerChanged = false;
    editableIds.forEach((id) => {
      const el = document.getElementById(id);
      const key = "recess_" + id;
      if (s[key] !== undefined && document.activeElement !== el && el.textContent !== s[key]) {
        el.textContent = s[key];
        if (id === "tickerText1") tickerChanged = true;
      }
    });
    if (tickerChanged) {
      document.getElementById("tickerText2").textContent = document.getElementById("tickerText1").textContent;
    }
  }

  const initial = loadShared();
  editableIds.forEach((id) => {
    const key = "recess_" + id;
    if (initial[key] !== undefined) {
      document.getElementById(id).textContent = initial[key];
    }
  });
  document.getElementById("tickerText2").textContent = document.getElementById("tickerText1").textContent;

  (async () => {
    const remote = await fetchRemote();
    if (remote) {
      saveLocal(Object.assign({}, loadShared(), remote));
      applyState(remote);
    }
  })();

  editableIds.forEach((id) => {
    const el = document.getElementById(id);
    el.addEventListener("blur", () => {
      saveShared({ ["recess_" + id]: el.textContent });
      if (id === "tickerText1") document.getElementById("tickerText2").textContent = el.textContent;
      el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash");
    });
    el.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); el.blur(); } });
  });

  setInterval(async () => {
    const remote = await fetchRemote();
    if (!remote) return;
    saveLocal(Object.assign({}, loadShared(), remote));
    applyState(remote);
  }, 1500);

  function updateTimecode() {
    const now = new Date();
    document.getElementById("clock").textContent = formatClock(now);
    document.getElementById("timecode").textContent = "LIVE " + new Intl.DateTimeFormat("zh-TW", {
      timeZone: "Asia/Taipei", year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
    }).format(now).replace(/\//g, ".");
  }
  updateTimecode();
  setInterval(updateTimecode, 1000);

  setTimeout(() => { document.getElementById("hint").style.opacity = "0"; }, 8000);
</script>
</body>
</html>
